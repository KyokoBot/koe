name: Publish
on:
  push:
    branches: [ '**' ]
    paths-ignore:
      - '**.md'
  release:
    types: [ published ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
      MAVEN_CENTRAL_USERNAME : ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build and Publish
        run: ./gradlew build publish --no-daemon -PmavenUsername=$MAVEN_USERNAME -PmavenUsername=$MAVEN_PASSWORD -PMAVEN_CENTRAL_USERNAME=$MAVEN_CENTRAL_USERNAME -PMAVEN_CENTRAL_PASSWORD=$MAVEN_CENTRAL_PASSWORD

      - name: Upload core Artifact
        uses: actions/upload-artifact@v6
        with:
          path: core/build/libs/core-*.jar

      - name: Upload ext-udpqueue Artifact
        uses: actions/upload-artifact@v6
        with:
          path: ext-udpqueue/build/libs/ext-udpqueue-*.jar
